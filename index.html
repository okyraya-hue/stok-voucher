<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voucher WiFi Offline</title>

<style>
body{
    margin:0;
    padding:6px;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
}

.container{
    max-width:900px;
    margin:auto;
}

.logo-box{
    text-align:center;
    margin-bottom:15px;
}

.logo-box img{
    width:65px;
    height:65px;
    border-radius:50%;
    background:white;
    padding:6px;
    box-shadow:0 0 10px rgba(255,255,255,0.3);
}

h1{
    text-align:center;
    font-size:20px;
    margin-bottom:15px;
}

.table-box{
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    background:rgba(255,255,255,0.08);
    border-radius:12px;
    overflow:hidden;
    font-size:11px;
}

th{
    background:#2563eb;
}

th,td{
    padding:8px 4px;
    text-align:center;
    border-bottom:1px solid rgba(255,255,255,0.1);
}

button{
    width:100%;
    padding:7px;
    border:none;
    border-radius:7px;
    cursor:pointer;
    color:white;
    font-size:11px;
    font-weight:bold;
}

.btn7{background:#16a34a;}
.btn2{background:#ea580c;}
.btn1{background:#dc2626;}
.btn30{background:#7c3aed;}

.voucher-box{
    margin-top:15px;
    background:rgba(255,255,255,0.08);
    padding:12px;
    border-radius:12px;
    display:none;
    text-align:center;
}

.code{
    font-size:16px;
    margin:12px 0;
    color:#facc15;
    font-weight:bold;
    word-break:break-all;
}

.use-btn{
    background:#2563eb;
}

.stock{
    color:#4ade80;
    font-weight:bold;
}

.empty{
    color:#f87171;
}

@media(min-width:700px){

    body{
        padding:20px;
    }

    h1{
        font-size:28px;
    }

    table{
        font-size:15px;
    }

    th,td{
        padding:15px;
    }

    button{
        font-size:14px;
        padding:10px;
    }

    .logo-box img{
        width:90px;
        height:90px;
    }

    .code{
        font-size:22px;
    }
}
</style>
</head>
<body>

<div class="container">

    <div class="logo-box">
        <img src="logo.png" alt="Logo">
    </div>

    <h1>🎫 Tabel Voucher WiFi</h1>

    <div class="table-box">
        <table>
            <thead>
                <tr>
                    <th>Voucher</th>
                    <th>Aktif</th>
                    <th>Stok</th>
                    <th>Buka</th>
                </tr>
            </thead>

            <tbody>

                <tr>
                    <td>7 Hari</td>
                    <td>7 Hari</td>
                    <td class="stock" id="stock7">3</td>
                    <td>
                        <button class="btn7" onclick="showVoucher('7')">
                            Buka
                        </button>
                    </td>
                </tr>

                <tr>
                    <td>2 Hari</td>
                    <td>2 Hari</td>
                    <td class="stock" id="stock2">3</td>
                    <td>
                        <button class="btn2" onclick="showVoucher('2')">
                            Buka
                        </button>
                    </td>
                </tr>

                <tr>
                    <td>1 Hari</td>
                    <td>1 Hari</td>
                    <td class="stock" id="stock1">3</td>
                    <td>
                        <button class="btn1" onclick="showVoucher('1')">
                            Buka
                        </button>
                    </td>
                </tr>

                <tr>
                    <td>30 Hari</td>
                    <td>30 Hari</td>
                    <td class="stock" id="stock30">3</td>
                    <td>
                        <button class="btn30" onclick="showVoucher('30')">
                            Buka
                        </button>
                    </td>
                </tr>

            </tbody>
        </table>
    </div>

    <div class="voucher-box" id="voucherBox">

        <h2 id="voucherTitle"></h2>

        <div class="code" id="voucherCode"></div>

        <button class="use-btn" onclick="useVoucher()">
            Gunakan Voucher
        </button>

    </div>

</div>

<script>

const vouchers = {

    7:[
        '8933',
        '9273',
        '73854'
    ],

    2:[
        '2745',
        '3697',
        'vvVb'
    ],

    1:[
        '8674',
        '3562',
        '8SKY'
    ],

    30:[
        '4834',
        '5566',
        '9225'
    ]
};

let currentType='';

function saveData(){
    localStorage.setItem(
        'voucherData',
        JSON.stringify(vouchers)
    );
}

function loadData(){

    const data=
    localStorage.getItem('voucherData');

    if(data){

        const parsed=JSON.parse(data);

        Object.keys(parsed).forEach(key=>{
            vouchers[key]=parsed[key];
        });
    }

    updateStocks();
}

function updateStocks(){

    document.getElementById('stock7')
    .innerText=vouchers[7].length;

    document.getElementById('stock2')
    .innerText=vouchers[2].length;

    document.getElementById('stock1')
    .innerText=vouchers[1].length;

    document.getElementById('stock30')
    .innerText=vouchers[30].length;

    checkEmpty('7');
    checkEmpty('2');
    checkEmpty('1');
    checkEmpty('30');
}

function checkEmpty(type){

    const stock=
    document.getElementById('stock'+type);

    if(vouchers[type].length<=0){

        stock.classList.add('empty');
    }
}

function showVoucher(type){

    currentType=type;

    if(vouchers[type].length<=0){

        alert('Stok voucher habis');
        return;
    }

    document.getElementById('voucherBox')
    .style.display='block';

    document.getElementById('voucherTitle')
    .innerText='Kode Voucher '+type+' Hari';

    document.getElementById('voucherCode')
    .innerText=vouchers[type][0];
}

function useVoucher(){

    if(currentType==='') return;

    vouchers[currentType].shift();

    saveData();

    updateStocks();

    alert('Voucher berhasil digunakan');

    document.getElementById('voucherBox')
    .style.display='none';
}

loadData();

</script>

</body>
</html>
